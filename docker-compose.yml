services:
  neo4j:
    image: neo4j:5.26
    container_name: hangover-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      # Override with your own password; must match NEO4J_PASSWORD in .env
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-please-change-me}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
